name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"
      - run: uv sync --locked --group dev
      - run: uv run ruff format --check src/ tests/
      - run: uv run ruff check src/ tests/
      - run: uv run mypy src/
      - run: uv run vulture src/ tests/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"
      - name: Install Ansible collections
        run: |
          uv sync --locked --group dev
          uv run ansible-galaxy collection install ibm.ibm_zos_core
      - name: Run unit + schema tests (no containers, no Ollama)
        run: uv run pytest tests/test_unit.py tests/test_llm.py -v -k "not linuxone and not watsonx" --tb=short

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8
      - run: uv audit
