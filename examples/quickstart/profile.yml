# Quickstart profile. Targets localhost via ansible_connection=local.
#
# Modules:
#   ansible.builtin.ping
#   ansible.builtin.command
#   ansible.builtin.setup
#   ansible.builtin.debug
#
# Usage:
#   rocannon mcp doctor --profile examples/quickstart/profile.yml
#   rocannon repl       --profile examples/quickstart/profile.yml

inventories:
  - ./hosts

modules:
  - ansible.builtin.ping
  - ansible.builtin.command
  - ansible.builtin.setup
  - ansible.builtin.debug
