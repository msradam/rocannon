# Quickstart profile. Runs against localhost; no SSH, no cloud.
#
# Loads:
#   - ansible.builtin.ping
#   - ansible.builtin.command
#   - ansible.builtin.setup
#   - ansible.builtin.debug
#
# Run with:
#   rocannon mcp doctor --profile examples/quickstart/profile.yml
#   rocannon repl       --profile examples/quickstart/profile.yml

inventories:
  - ./hosts

modules:
  - ansible.builtin.ping
  - ansible.builtin.command
  - ansible.builtin.setup
  - ansible.builtin.debug
