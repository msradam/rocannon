# Quickstart profile. Runs against localhost, no SSH, no cloud, no kubernetes.
#
# Loads:
#   - Ansible cannon: ping, command, setup against the local machine
#   - Terraform cannon: null and random providers, all their resources
#
# Run with:
#   rocannon mcp doctor --profile examples/quickstart/profile.yml
#   rocannon repl       --profile examples/quickstart/profile.yml

inventories:
  - ./hosts

modules:
  - ansible.builtin.ping
  - ansible.builtin.command
  - ansible.builtin.setup
  - ansible.builtin.debug

terraform:
  workspace: ./tf-work
  providers:
    # Note: the YAML key has to be quoted because unquoted `null` parses to None.
    "null":
      source: hashicorp/null
      version: "~> 3.2"
    random:
      source: hashicorp/random
      version: "~> 3.6"
