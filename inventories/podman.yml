      ansible_ssh_extra_args: "-o StrictHostKeyChecking=no"
    podman-rocky:
      ansible_host: 127.0.0.1
      ansible_port: 2224
      ansible_user: rocannon
      ansible_password: rocannon
      ansible_become: true
      ansible_become_password: rocannon
      ansible_ssh_extra_args: "-o StrictHostKeyChecking=no"
