# Demo: community.postgresql — full PostgreSQL lifecycle
# Install postgres on the demo container first:
#   ansible demo -i dev/inventories/demo.yml -m ansible.builtin.apt \
#     -a "name=postgresql state=present" -b
#   ansible demo -i dev/inventories/demo.yml -m ansible.builtin.service \
#     -a "name=postgresql state=started enabled=true" -b
#
# Then start this profile and let the LLM manage databases, roles, and privileges.

inventories:
  - ./inventories/podman.yml
modules:
  - ansible.builtin
  - community.postgresql.postgresql_db
  - community.postgresql.postgresql_user
  - community.postgresql.postgresql_privs
  - community.postgresql.postgresql_pg_hba
  - community.postgresql.postgresql_query
  - community.postgresql.postgresql_info
  - community.postgresql.postgresql_table
  - community.postgresql.postgresql_schema
  - community.postgresql.postgresql_ext
