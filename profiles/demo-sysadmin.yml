# Demo: community.general + ansible.posix — Linux sysadmin toolkit
# Showcases modules beyond the builtins: firewall rules, locales, timezone,
# sysctl tuning, POSIX ACLs, SSH key management, sudoers, LVM, systemd introspection.

inventories:
  - ./inventories/podman.yml
modules:
  - ansible.builtin
  - ansible.posix
  - community.general.timezone
  - community.general.locale_gen
  - community.general.ufw
  - community.general.snap
  - community.general.sudoers
  - community.general.pam_limits
  - community.general.listen_ports_facts
  - community.general.systemd_info
  - community.general.ini_file
  - community.general.ssh_config
  - community.general.htpasswd
  - ansible.posix.authorized_key
  - ansible.posix.sysctl
  - ansible.posix.acl
  - ansible.posix.synchronize
