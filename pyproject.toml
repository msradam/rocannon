[project]
name = "rocannon"
version = "0.3.0"
description = "Ansible modules as MCP tools"
readme = "README.md"
authors = [
    { name = "Adam Munawar Rahman", email = "msrahmanadam@gmail.com" }
]
requires-python = ">=3.11"
dependencies = [
    "ansible-core>=2.19.7",
    "ansible-runner>=2.4.2",
    "click>=8.1.0",
    "fastmcp>=3.1.0",
    "pydantic>=2.12.5",
    "pyyaml>=6.0.3",
]

[project.scripts]
rocannon = "rocannon.cli:main"

[build-system]
requires = ["uv_build>=0.9.3,<0.10.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "mypy>=1.19.1",
    "ollama>=0.6.1",
    "pre-commit>=4.5.1",
    "pytest>=8.0",
    "pytest-asyncio>=1.0",
    "ruff>=0.15.5",
    "types-pyyaml>=6.0.12.20250915",
    "vulture>=2.15",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"

# --- Ruff ---
[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src"]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "N", "UP", "B", "C4", "SIM", "S", "FURB"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101", "S105", "S110", "S603", "S607"]
"src/rocannon/schema.py" = ["S603", "S607"]
"src/rocannon/inventory.py" = ["S603"]

[tool.ruff.format]
quote-style = "double"

# --- Mypy ---
[tool.mypy]
python_version = "3.11"
strict = true
disallow_untyped_defs = true
warn_return_any = true
warn_unused_ignores = true
warn_redundant_casts = true
no_implicit_reexport = true
mypy_path = "src"

# --- Vulture ---
[tool.vulture]
min_confidence = 80
paths = ["src/", "tests/"]
ignore_names = ["cls"]
