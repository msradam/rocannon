[project]
name = "rocannon"
version = "0.3.0"
description = "Ansible modules as MCP tools"
readme = "README.md"
authors = [
    { name = "Adam Munawar Rahman", email = "msrahmanadam@gmail.com" }
]
requires-python = ">=3.11"
dependencies = [
    "ansible-core>=2.19.7",
    "ansible-runner>=2.4.2",
    "click>=8.1.0",
    "fastmcp>=3.1.0",
    "pydantic>=2.12.5",
    "pyyaml>=6.0.3",
]

[project.scripts]
rocannon = "rocannon.cli:main"

[build-system]
requires = ["uv_build>=0.9.3,<0.10.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "ruff>=0.15.5",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP"]
